{% extends "base.html" %}

{% block content %}
<section class="page-intro">
    <p class="eyebrow">{{ page.eyebrow }}</p>
    <h1>{{ page.headline }}</h1>
    <p class="lead-copy">{{ page.intro }}</p>
</section>

<section class="panel-stack">
    <div class="card-grid">
        {% for section in page.sections %}
        <article class="info-card tall-card">
            <h2>{{ section.title }}</h2>
            <p>{{ section.body }}</p>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
