<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.name }}</title>
    <meta name="description" content="{{ page.meta_description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="page-shell">
        <header class="site-header" data-mobile-nav data-nav-open="false">
            <div class="brand-block">
                <a class="brand-mark" href="{{ url_for('home') }}">{{ site.name }}</a>
                <p class="brand-copy">{{ site.role }}</p>
            </div>
            <button
                class="nav-toggle"
                type="button"
                aria-controls="primary-nav"
                aria-expanded="false"
                aria-label="Toggle navigation menu"
                data-nav-toggle
            >
                <span class="nav-toggle-bars" aria-hidden="true"></span>
                <span class="sr-only">Menu</span>
            </button>
            <nav class="site-nav" id="primary-nav" aria-label="Primary" data-nav-menu>
                {% for item in navigation %}
                <a class="nav-link{% if item.slug == page_name %} is-active{% endif %}" href="{{ url_for(item.endpoint) }}">{{ item.label }}</a>
                {% endfor %}
            </nav>
        </header>

        <main id="main-content" class="content-frame">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>{{ site.name }} · {{ site.tagline }}</p>
            <p>Designed to be responsive now and extend cleanly later.</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/site_nav.js') }}"></script>
</body>
</html>
