openapi: 3.0.3

info:
  title: ACA Scaling API
  description: >
    API for managing Azure Container Apps scaling.
    Provides endpoints to send messages to a Service Bus queue,
    query the active revision name, retrieve replica counts, and
    check the current queue depth.
  version: 1.0.0

servers:
  - url: /

paths:

  /api/v1/send-message/{messageCount}:
    get:
      operationId: sendMessages
      summary: Send messages to the Service Bus queue
      description: >
        Generates and enqueues the specified number of messages.
        Each message carries a unique WorkId and a fixed JobId of
        "purchasetickets". The correlation ID from the X-Correlation-Id
        request header (or the trace identifier if absent) is stamped on
        every message.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: messageCount
          in: path
          required: true
          description: Number of messages to generate and send (0–5000).
          schema:
            type: integer
            minimum: 0
            maximum: 5000
            example: 100
      responses:
        '202':
          description: Messages accepted and sent to the queue.
          headers:
            Location:
              description: The number of messages sent (returned as the Location value).
              schema:
                type: string
                example: "100"
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/replicas/{revisionName}:
    get:
      operationId: getReplicaCount
      summary: Get the replica count for a Container App revision
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: revisionName
          in: path
          required: true
          description: >
            Name of the Container App revision.
            Must be 1–100 characters and contain only alphanumeric
            characters and hyphens.
          schema:
            type: string
            maxLength: 100
            pattern: '^[a-zA-Z0-9-]+$'
            example: my-app--revision-abc123
      responses:
        '200':
          description: Replica count retrieved successfully.
          content:
            application/json:
              schema:
                type: integer
                example: 3
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/revisionName/:
    get:
      operationId: getRevisionName
      summary: Get the active Container App revision name
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Active revision name retrieved successfully.
          content:
            application/json:
              schema:
                type: string
                example: my-app--revision-abc123
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'
        '404':
          description: No active revision found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/queue-length/:
    get:
      operationId: getQueueLength
      summary: Get the current Service Bus queue depth
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Queue depth retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueContent'
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >
        Client-supplied correlation ID for distributed tracing.
        If omitted, the server's trace identifier is used.
        The value is echoed back in the X-Correlation-Id response header.
      schema:
        type: string
        example: 00-abc123def456-ghijkl789012-00

  headers:
    CorrelationIdResponse:
      description: Correlation ID echoed from the request (or the server trace identifier).
      schema:
        type: string
        example: 00-abc123def456-ghijkl789012-00

  schemas:

    ApiError:
      type: object
      required:
        - code
        - message
        - correlationId
      properties:
        code:
          type: string
          description: Short error code.
          example: BadRequest
        message:
          type: string
          description: Human-readable description of the error.
          example: Invalid request parameters.
        correlationId:
          type: string
          description: Correlation ID from the originating request.
          example: 00-abc123def456-ghijkl789012-00
        details:
          type: object
          nullable: true
          description: >
            Field-level validation errors keyed by property name.
            Only present on 400 responses.
          additionalProperties:
            type: array
            items:
              type: string
          example:
            MessageCount:
              - "Message Count must be less than 5000"
            revisionName:
              - "Revision name can only contain alphanumeric characters and hyphens."

    QueueContent:
      type: object
      properties:
        activeMessageCount:
          type: string
          description: >
            Number of active (non-dead-lettered) messages currently in
            the Service Bus queue.
          example: "42"

  responses:

    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            code: BadRequest
            message: Invalid request parameters.
            correlationId: 00-abc123def456-ghijkl789012-00
            details:
              MessageCount:
                - "Message Count must be less than 5000"
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdResponse'

    TooManyRequests:
      description: Queue is not empty; a previous batch is still being processed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            code: Conflict
            message: "Queue is not empty. Current active message count: 42."
            correlationId: 00-abc123def456-ghijkl789012-00
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdResponse'

    InternalServerError:
      description: An unexpected error or Azure service failure occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            code: InternalServerError
            message: An unexpected error occurred.
            correlationId: 00-abc123def456-ghijkl789012-00
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdResponse'
